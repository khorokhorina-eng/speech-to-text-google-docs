<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Speech to Text Google Docs Feedback</title>
    <link rel="stylesheet" href="uninstall.css" />
  </head>
  <body>
    <main class="page">
      <section class="card hero">
        <p class="eyebrow">Speech to Text Google Docs</p>
        <h1>We're sorry to see you go.</h1>
        <p class="intro">
          One short answer is enough. Your feedback helps improve the extension.
        </p>
      </section>

      <section class="card form-card">
        <iframe
          class="form-frame"
          title="Uninstall feedback form"
          src="https://docs.google.com/forms/d/e/1FAIpQLSdAKg7rhAq23nLsY80n92-IjBYrmNCwKd5JAvEbkV8lD6_Xjg/viewform?embedded=true"
          loading="lazy"
          referrerpolicy="strict-origin-when-cross-origin"
        ></iframe>
      </section>
    </main>
  </body>
</html>
